<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dr Abdulla — CV</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
:root{
  --bg:#0f172a;
  --text:#e6eef8;
  --card:rgba(30,41,59,0.72);
  --border:rgba(148,163,184,0.12);
  --accent:#4f46e5;
  --accent-2:#10b981;
  --particle:#64748b;
  --particle-line:#475569;
}

/* LIGHT MODE */
.light-mode{
  --bg:#f8fafc;
  --text:#0f172a;
  --card:rgba(255,255,255,0.9);
  --border:rgba(100,116,139,0.12);
  --accent:#4338ca;
  --accent-2:#059669;
  --particle:#94a3b8;
  --particle-line:#cbd5e1;
}

html,body{height:100%;}
body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
  transition:.35s ease;
  line-height:1.6;
  overflow-x:hidden;
}

/* THEME-AWARE LINKS */
a{
  color:var(--accent);
  text-decoration:none;
  font-weight:500;
}
a:hover{color:var(--accent-2);}

/* NAV */
header.site-nav{
  position:sticky;
  top:0;
  z-index:60;
  backdrop-filter:blur(8px);
  background:var(--card); /* FIXED */
  border-bottom:1px solid var(--border);
}

.nav-link{
  color:var(--text);
  display:inline-flex;
  gap:.5rem;
  align-items:center;
  font-weight:600;
}
.nav-link:hover{color:var(--accent);}

/* HERO THEME SUPPORT */
.hero{
  background:linear-gradient(135deg,#020617,#1e1b4b);
}
.light-mode .hero{
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
}

/* GLASS */
.glass{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:1rem;
  padding:1.25rem;
  box-shadow:0 8px 28px rgba(0,0,0,.18);
  transition:.25s ease;
}
.glass:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
}

/* TIMELINE */
.timeline{position:relative;padding-left:2.5rem;}
.timeline::before{
  content:'';
  position:absolute;
  top:0;
  left:1rem;
  width:2px;
  height:100%;
  background:linear-gradient(180deg,var(--accent),var(--accent-2));
}
.timeline-item{position:relative;margin-bottom:1.5rem;padding-left:1rem;}
.timeline-dot{
  position:absolute;
  left:0.6rem;
  top:0.25rem;
  width:14px;height:14px;border-radius:50%;
  background:var(--accent);
  border:3px solid var(--bg);
}

/* ACCORDION */
.accordion-btn{
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:.75rem 1rem;
  border-radius:.75rem;
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
  font-weight:700;
}
.accordion-panel{
  max-height:0;
  overflow:hidden;
  transition:.45s ease;
  padding:0 1rem;
}
.accordion-panel.open{
  padding:1rem;
  max-height:2000px;
}

.muted{color:rgba(148,163,184,.8);}
.tag{
  display:inline-block;
  padding:.25rem .5rem;
  font-size:.8rem;
  border-radius:.5rem;
  background:rgba(255,255,255,.06);
  font-weight:700;
}
</style>
</head>

<body>

<header class="site-nav">
<div class="container mx-auto px-6 py-3 flex justify-between items-center">
<div class="font-bold text-lg">Dr Abdulla</div>

<nav class="flex gap-6 items-center">
<a href="#" class="nav-link">CV</a>
<a href="#" class="nav-link">Research</a>

<button id="theme-toggle" class="p-2 rounded-full">
<i class="fas fa-moon"></i>
</button>
</nav>
</div>
</header>

<!-- HERO -->
<section class="hero text-center py-16">
<h1 class="text-4xl font-bold">Dr Abdulla</h1>
<p class="muted">Assistant Professor — Jamia Millia Islamia</p>
</section>

<main class="container mx-auto px-6 py-12">

<div class="glass">
<h2 class="text-2xl font-semibold">Selected Publications</h2>

<button class="accordion-btn mt-4" data-target="pub-panel">
<span>Show / hide publications</span>
<i class="fas fa-chevron-down"></i>
</button>

<div id="pub-panel" class="accordion-panel">

<div class="mt-4 space-y-4">

<div>
<strong>2024</strong> —
Impact of Climate Change on Agriculture.
<a href="https://doi.org/10.5958/0974-0279.2022.00006.2">DOI</a>
</div>

<div>
<strong>2020</strong> —
Dynamics of Technical Efficiency of Sugar Mills.
<a href="https://doi.org/10.56093/ijas.v90i8.105958">DOI</a>
</div>

</div>
</div>
</div>

</main>

<script>
const themeToggle=document.getElementById('theme-toggle');
const bodyEl=document.body;
const icon=themeToggle.querySelector('i');

if(localStorage.getItem('theme')==='light'){
bodyEl.classList.add('light-mode');
icon.classList.replace('fa-moon','fa-sun');
}

themeToggle.addEventListener('click',()=>{
bodyEl.classList.toggle('light-mode');
const isLight=bodyEl.classList.contains('light-mode');
icon.classList.toggle('fa-sun',isLight);
icon.classList.toggle('fa-moon',!isLight);
localStorage.setItem('theme',isLight?'light':'dark');
});

document.querySelectorAll('.accordion-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
const panel=document.getElementById(btn.dataset.target);
panel.classList.toggle('open');
});
});
</script>

</body>
</html>
